<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Library - Wooden Bookshelf</title>
    <style>
        @font-face {
            font-family: 'PyidaungsuMM';
            src: url('https://raw.githubusercontent.com/WoWepub/Font/main/subset-Pyidaungsu.woff2') format('woff2');
            font-display: swap;
        }

        :root {
            --shelf-color: #5d4037;
            --shelf-light: #8d6e63;
            --bg-color: #f4f1ea;
            --text-dark: #3e2723;
            --primary: #d84315;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PyidaungsuMM', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
        }

        header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.7);
            border-bottom: 2px solid var(--shelf-color);
            margin-bottom: 40px;
            backdrop-filter: blur(5px);
        }

        .logo h1 {
            font-size: 1.8rem;
            color: var(--shelf-color);
            margin-bottom: 10px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
            color: #fff;
        }

        .social-link.facebook { background: #1877f2; }
        .social-link.youtube { background: #ff0000; }
        .social-link.twitter { background: #000; }
        .social-link.telegram { background: #0088cc; }

        .social-icon { width: 16px; height: 16px; fill: currentColor; }

        .search-box {
            max-width: 400px;
            margin: 15px auto 0;
            display: flex;
        }

        .search-box input {
            flex: 1;
            padding: 8px 15px;
            border: 2px solid var(--shelf-color);
            border-right: none;
            border-radius: 4px 0 0 4px;
            font-family: inherit;
            outline: none;
            font-size: 0.9rem;
        }

        .search-box button {
            background: var(--shelf-color);
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-weight: 600;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* Wooden Bookshelf Grid */
        .shelf-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding-bottom: 10px;
            border-bottom: 12px solid var(--shelf-color);
            box-shadow: 0 10px 10px -5px rgba(0,0,0,0.2);
            margin-bottom: 40px;
            position: relative;
        }

        .shelf-row::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--shelf-light);
            border-radius: 0 0 4px 4px;
        }

        .author-card {
            background: var(--white);
            height: 140px; /* Compact height */
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            border-radius: 4px;
            overflow: hidden;
            position: relative;
        }

        .author-card:hover {
            transform: translateY(-8px) scale(1.03);
            z-index: 10;
        }

        .author-img {
            width: 100%;
            height: 90px;
            object-fit: cover;
            background: #eee;
        }

        .author-info {
            padding: 5px;
            text-align: center;
            background: var(--white);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .author-name {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-count {
            font-size: 0.6rem;
            color: var(--primary);
            font-weight: 600;
        }

        /* Modal - Original Expand Design */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #1a1a1a;
            width: 100%;
            max-width: 550px;
            border-radius: 12px;
            padding: 25px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            color: #eee;
        }

        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.8rem;
            cursor: pointer;
            color: #888;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .modal-author-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--primary);
        }

        .modal-author-name {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
        }

        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            margin-bottom: 8px;
            border-radius: 8px;
        }

        .read-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: var(--shelf-color);
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .shelf-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1>Whisper Library</h1>
    </div>
    
    <div class="social-links">
        <a class="social-link facebook" href="https://www.facebook.com/mmebookwhisper/" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
        </a>
        <a class="social-link youtube" href="https://www.youtube.com/@whisperofwordsebook" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            YouTube
        </a>
        <a class="social-link twitter" href="https://x.com/whisperw69842" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Twitter/X
        </a>
        <a class="social-link telegram" href="https://t.me/TheBookR" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            Telegram
        </a>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="စာရေးဆရာ ရှာဖွေရန်...">
        <button>ရှာမယ်</button>
    </div>
</header>

<div class="container" id="shelf-container">
    <!-- Rows will be loaded here -->
</div>

<footer>
    <p>&copy; 2026 Whisper Library | All books are provided for free.</p>
</footer>

<div class="modal" id="book-modal">
    <div class="modal-content">
        <span class="close-modal" id="close-modal">&times;</span>
        <div class="modal-header">
            <img id="modal-author-img" src="" class="modal-author-img">
            <h2 id="modal-author-name" class="modal-author-name">Author Name</h2>
        </div>
        <div id="modal-book-list"></div>
    </div>
</div>

<script>
    let libraryData = [];
    const authorPortraits = {
        "မင်းလူ": "https://www.pannsattlann.com/wp-content/uploads/2026/03/မင်းလူ-300x300.png",
        "ချစ်ဦးညို": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcS1D6I_bb57SZhKeHwLxIQ66rhKcI5YMkw2GNWmqv2ZQn847x2t2mawRT0ce883OxU7Cd4PWP7CA4rd_KxZ1d30h_5JZOH1EbJf43_JFw&s=10",
        "မြသန်းတင့်": "https://mgyoe.com/wp-content/uploads/2021/06/Expert-Mya-Than-Tint.jpg",
        "ဂျူး": "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRW3zSl9bjcjGvpigw8r7fT9iikM_2l-5RLnFXeAxpOhIJ02MdCz1OfXiQiVQSHOez3FRiEim68xhTpqHaZx2PxMMpXvX1utixIASOnRQ&s=10",
        "တက္ကသိုလ်ဘုန်းနိုင်": "https://upload.wikimedia.org/wikipedia/my/thumb/b/b3/Tekkatho_Phone_Naing.jpg/220px-Tekkatho_Phone_Naing.jpg",
        "မောင်ထွန်းသူ": "https://upload.wikimedia.org/wikipedia/my/thumb/3/3a/Maung_Tun_Thu.jpg/220px-Maung_Tun_Thu.jpg",
        "default": "https://ui-avatars.com/api/?background=5d4037&color=f4f1ea&name="
    };

    async function init() {
        try {
            const response = await fetch('data.json');
            libraryData = await response.json();
            renderShelf(libraryData);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function getPortrait(name) {
        return authorPortraits[name] || (authorPortraits.default + encodeURIComponent(name));
    }

    function renderShelf(data) {
        const container = document.getElementById('shelf-container');
        container.innerHTML = '';
        
        for (let i = 0; i < data.length; i += 4) {
            const rowData = data.slice(i, i + 4);
            const rowDiv = document.createElement('div');
            rowDiv.className = 'shelf-row';
            
            rowDiv.innerHTML = rowData.map(author => `
                <div class="author-card" onclick='showBooks(${JSON.stringify(author).replace(/'/g, "&apos;")})'>
                    <img src="${getPortrait(author.author)}" class="author-img" alt="${author.author}" onerror="this.src='${authorPortraits.default + author.author}'">
                    <div class="author-info">
                        <div class="author-name">${author.author}</div>
                        <div class="book-count">${author.books.length} Books</div>
                    </div>
                </div>
            `).join('');
            
            container.appendChild(rowDiv);
        }
    }

    function showBooks(author) {
        const modal = document.getElementById('book-modal');
        document.getElementById('modal-author-name').textContent = author.author;
        document.getElementById('modal-author-img').src = getPortrait(author.author);
        const list = document.getElementById('modal-book-list');
        list.innerHTML = author.books.map(b => `
            <div class="book-item">
                <span style="font-size: 0.9rem;">${b.title}</span>
                <a href="${b.link}" target="_blank" class="read-btn">ဖတ်ရန်</a>
            </div>
        `).join('');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = libraryData.filter(a => 
            a.author.toLowerCase().includes(query) || 
            a.books.some(b => b.title.toLowerCase().includes(query))
        );
        renderShelf(filtered);
    });

    document.getElementById('close-modal').onclick = () => {
        document.getElementById('book-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    window.onclick = (e) => {
        if (e.target == document.getElementById('book-modal')) {
            document.getElementById('book-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };

    init();
</script>

</body>
</html>
