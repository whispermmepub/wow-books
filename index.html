<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Library - Modern E-book Collection</title>
    <style>
        @font-face {
            font-family: 'PyidaungsuMM';
            src: url('https://raw.githubusercontent.com/WoWepub/Font/main/subset-Pyidaungsu.woff2') format('woff2');
            font-display: swap;
        }

        :root {
            --primary: #7c8cf5;
            --secondary: #a78bfa;
            --bg-dark: #0d0b1e;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
            --text-dim: #9999bb;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PyidaungsuMM', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        /* Header Section */
        header {
            text-align: center;
            margin-bottom: 60px;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .logo-container svg {
            width: 50px;
            height: 50px;
            fill: var(--primary);
            filter: drop-shadow(0 0 10px rgba(124, 140, 245, 0.3));
        }

        h1 {
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        /* Search Box */
        .search-wrapper {
            max-width: 600px;
            margin: 0 auto 50px;
            position: relative;
        }

        .search-wrapper input {
            width: 100%;
            padding: 15px 25px 15px 55px;
            border-radius: 30px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 1rem;
            outline: none;
            transition: var(--transition);
            font-family: inherit;
        }

        .search-wrapper input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 20px rgba(124, 140, 245, 0.2);
        }

        .search-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
            font-size: 1.2rem;
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 50px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        /* Author Grid */
        .author-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .author-card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .author-card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(124, 140, 245, 0.3);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .author-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: linear-gradient(to bottom, var(--primary), var(--secondary));
            opacity: 0;
            transition: var(--transition);
        }

        .author-card:hover::before {
            opacity: 1;
        }

        .author-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .author-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #fff;
        }

        .book-badge {
            background: rgba(124, 140, 245, 0.15);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .book-preview {
            font-size: 0.9rem;
            color: var(--text-dim);
            line-height: 1.6;
        }

        /* Modal / Overlay for Books */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 11, 30, 0.95);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: #1a1735;
            width: 100%;
            max-width: 600px;
            border-radius: 25px;
            padding: 40px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 20px;
            background: none; border: none;
            color: var(--text-dim);
            font-size: 1.5rem;
            cursor: pointer;
            transition: var(--transition);
        }

        .close-modal:hover { color: #fff; }

        .modal-author {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--primary);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 15px;
            margin-bottom: 12px;
            transition: var(--transition);
        }

        .book-item:hover {
            background: rgba(255, 255, 255, 0.06);
        }

        .book-title {
            font-size: 1rem;
            color: #e0e0e0;
        }

        .download-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: var(--transition);
        }

        .download-btn:hover {
            background: var(--secondary);
            transform: scale(1.05);
        }

        /* Footer */
        footer {
            text-align: center;
            margin-top: 80px;
            padding: 40px 0;
            color: var(--text-dim);
            font-size: 0.9rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 1.8rem; }
            .author-grid { grid-template-columns: 1fr; }
            .stats-bar { gap: 20px; }
            .modal-content { padding: 25px; }
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-dark); }
        ::-webkit-scrollbar-thumb { background: var(--card-bg); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo-container">
            <svg viewBox="0 0 24 24"><path d="M21 4H8a1 1 0 0 0-1 1v12a1 1 0 0 0 1 1h13a1 1 0 0 0 1-1V5a1 1 0 0 0-1-1zM7 5a1 1 0 0 0-2 0v14.34a1 1 0 0 0 .29.71L7.41 22H10V5.41L7.88 3.29A1 1 0 0 0 7 3v2z"/></svg>
            <h1>Whisper Library</h1>
        </div>
        <p class="subtitle">A Modern Collection of Myanmar E-books</p>
        
        <div class="stats-bar">
            <div class="stat-item">
                <span class="stat-value" id="author-count">0</span>
                <span class="stat-label">စာရေးဆရာ</span>
            </div>
            <div class="stat-item">
                <span class="stat-value" id="book-count">0</span>
                <span class="stat-label">စာအုပ်</span>
            </div>
        </div>

        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="စာရေးဆရာ သို့မဟုတ် စာအုပ်အမည် ရှာပါ...">
        </div>
    </header>

    <div class="author-grid" id="author-grid">
        <!-- Authors will be loaded here -->
    </div>

    <footer>
        <p>&copy; 2026 Whisper Library. All books are provided for free.</p>
    </footer>
</div>

<!-- Modal -->
<div class="modal" id="book-modal">
    <div class="modal-content">
        <button class="close-modal" id="close-modal">&times;</button>
        <h2 class="modal-author" id="modal-author-name">Author Name</h2>
        <div id="modal-book-list">
            <!-- Books will be loaded here -->
        </div>
    </div>
</div>

<script>
    let libraryData = [];

    // Load data
    async function init() {
        try {
            const response = await fetch('data.json');
            libraryData = await response.json();
            
            // Update stats
            document.getElementById('author-count').textContent = libraryData.length;
            const totalBooks = libraryData.reduce((sum, author) => sum + author.books.length, 0);
            document.getElementById('book-count').textContent = totalBooks;

            renderAuthors(libraryData);
        } catch (error) {
            console.error('Error loading data:', error);
        }
    }

    function renderAuthors(data) {
        const grid = document.getElementById('author-grid');
        grid.innerHTML = '';

        data.forEach(author => {
            const card = document.createElement('div');
            card.className = 'author-card';
            card.innerHTML = `
                <div class="author-info">
                    <span class="author-name">${author.author}</span>
                    <span class="book-badge">${author.books.length} အုပ်</span>
                </div>
                <div class="book-preview">
                    ${author.books.slice(0, 2).map(b => b.title).join(', ')}${author.books.length > 2 ? '...' : ''}
                </div>
            `;
            card.onclick = () => showBooks(author);
            grid.appendChild(card);
        });
    }

    function showBooks(author) {
        const modal = document.getElementById('book-modal');
        const modalName = document.getElementById('modal-author-name');
        const bookList = document.getElementById('modal-book-list');

        modalName.textContent = author.author;
        bookList.innerHTML = author.books.map(book => `
            <div class="book-item">
                <span class="book-title">${book.title}</span>
                <a href="${book.link}" target="_blank" class="download-btn">ဖတ်ရန်</a>
            </div>
        `).join('');

        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    // Search functionality
    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = libraryData.filter(author => {
            const authorMatch = author.author.toLowerCase().includes(query);
            const bookMatch = author.books.some(book => book.title.toLowerCase().includes(query));
            return authorMatch || bookMatch;
        });
        renderAuthors(filtered);
    });

    // Close modal
    document.getElementById('close-modal').onclick = () => {
        document.getElementById('book-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    window.onclick = (event) => {
        if (event.target == document.getElementById('book-modal')) {
            document.getElementById('book-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };

    init();
</script>

</body>
</html>
