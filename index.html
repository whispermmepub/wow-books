            align-items: center;

            font-weight: 600;

            margin: 15px auto 0;
            position: relative;
        }

            width: 100%;
            padding: 10px 18px;
            padding-right: 45px;
            border: 1px solid #ddd;
            border-radius: 25px;
            background: #fff;
            font-family: inherit;
            outline: none;
            font-size: 0.9rem;
        }

        .search-box button {
            position: absolute;
            right: 4px;
            top: 4px;
            background: var(--primary);
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 15px 60px;
        }

        .author-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .author-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .author-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .author-img-container {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #f8f9fa;
        }

        .author-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            border-radius: var(--portrait-radius);
        }

        .author-info {
            padding: 10px;
            text-align: center;
        }

        .author-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-count-badge {
            display: inline-block;
            padding: 1px 8px;
            background: #fff3e0;
            color: var(--primary);
            font-size: 0.65rem;
            font-weight: 700;
            border-radius: 10px;
        }

        /* Modal Design */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 15px;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            padding: 25px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .modal-author-img {
            width: 72px;
            height: 72px;
            border-radius: var(--portrait-radius);
            object-fit: cover;
            object-position: center top;
            border: 2px solid var(--primary);
            background: #f8f9fa;
        }

        .modal-author-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--secondary);
        }

        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
        }

        .book-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .read-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8rem;
            color: #777;
        }

        @media (max-width: 992px) {

            .author-name { font-size: 0.7rem; }
            .book-count-badge { font-size: 0.55rem; padding: 1px 5px; }

    async function loadData() {
        try {
            const response = await fetch('data.json');
            libraryData = await response.json();
            renderAuthors(libraryData);
        } catch (error) {
            console.error("Error loading library data:", error);
        }
    }

    function renderAuthors(data) {
        const grid = document.getElementById('author-grid');
        grid.innerHTML = '';
        
        data.forEach((item, index) => {
            const portrait = authorPortraits[item.author] || defaultLogo;
            const card = document.createElement('div');
            card.className = 'author-card';
            card.innerHTML = `
                <div class="author-img-container">
                    <img src="${portrait}" class="author-img" alt="${item.author}" onerror="this.src='${defaultLogo}'">
                </div>
                <div class="author-info">
                    <div class="author-name">${item.author}</div>
                    <div class="book-count-badge">${item.books.length} Books</div>
                </div>
            `;
            card.onclick = () => showBooks(item);
            grid.appendChild(card);
        });
    }

    function showBooks(authorData) {
        const modal = document.getElementById('book-modal');
        const portrait = authorPortraits[authorData.author] || defaultLogo;
        
        document.getElementById('modal-author-name').innerText = authorData.author;
        document.getElementById('modal-author-img').src = portrait;
        
        const list = document.getElementById('modal-book-list');
        list.innerHTML = '';
        
        authorData.books.forEach(book => {
            const item = document.createElement('div');
            item.className = 'book-item';
            item.innerHTML = `
                <div class="book-title">${book.title}</div>
                <a href="${book.link}" target="_blank" class="read-btn">ဖတ်မယ်</a>
            `;
            list.appendChild(item);
        });
        
        modal.style.display = 'flex';
    }

    // Search functionality
    document.getElementById('search-input').oninput = function(e) {
        const query = e.target.value.toLowerCase();
        const filtered = libraryData.filter(item => {
            const authorMatch = item.author.toLowerCase().includes(query);
            const bookMatch = item.books.some(b => b.title.toLowerCase().includes(query));
            return authorMatch || bookMatch;
        });
        renderAuthors(filtered);
    };

    // Close modal
    document.getElementById('close-modal').onclick = () => {
        document.getElementById('book-modal').style.display = 'none';
    };

    window.onclick = (event) => {
        if (event.target == document.getElementById('book-modal')) {
            document.getElementById('book-modal').style.display = 'none';
        }
    };

    loadData();
</script>
