<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Library - Wooden Bookshelf</title>
    <style>
        @font-face {
            font-family: 'PyidaungsuMM';
            src: url('https://raw.githubusercontent.com/WoWepub/Font/main/subset-Pyidaungsu.woff2') format('woff2');
            font-display: swap;
        }

        :root {
            --shelf-color: #5d4037;
            --shelf-light: #8d6e63;
            --bg-color: #f4f1ea;
            --text-dark: #3e2723;
            --primary: #d84315;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PyidaungsuMM', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            background-image: url('https://www.transparenttextures.com/patterns/paper.png');
        }

        header {
            text-align: center;
            padding: 30px 20px;
            background: rgba(255, 255, 255, 0.5);
            border-bottom: 2px solid var(--shelf-color);
            margin-bottom: 40px;
        }

        .logo h1 {
            font-size: 1.8rem;
            color: var(--shelf-color);
            margin-bottom: 5px;
        }

        .search-box {
            max-width: 400px;
            margin: 15px auto;
            display: flex;
        }

        .search-box input {
            flex: 1;
            padding: 8px 15px;
            border: 2px solid var(--shelf-color);
            border-right: none;
            border-radius: 4px 0 0 4px;
            font-family: inherit;
            outline: none;
            font-size: 0.9rem;
        }

        .search-box button {
            background: var(--shelf-color);
            color: white;
            border: none;
            padding: 0 15px;
            border-radius: 0 4px 4px 0;
            cursor: pointer;
            font-weight: 600;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        /* Bookshelf Grid */
        .shelf-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            padding-bottom: 10px;
            border-bottom: 12px solid var(--shelf-color);
            box-shadow: 0 10px 10px -5px rgba(0,0,0,0.2);
            margin-bottom: 40px;
            position: relative;
        }

        .shelf-row::after {
            content: '';
            position: absolute;
            bottom: -18px;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--shelf-light);
            border-radius: 0 0 4px 4px;
        }

        .book-spine {
            background: var(--white);
            border-left: 4px solid var(--primary);
            height: 120px; /* Smaller height */
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: transform 0.2s;
            box-shadow: 2px 0 5px rgba(0,0,0,0.1);
            border-radius: 2px 4px 4px 2px;
            position: relative;
            overflow: hidden;
        }

        .book-spine:hover {
            transform: translateY(-8px) scale(1.05);
            z-index: 10;
        }

        .book-spine::before {
            content: '';
            position: absolute;
            top: 0; left: 5px; width: 1px; height: 100%;
            background: rgba(0,0,0,0.1);
        }

        .author-name {
            font-size: 0.85rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 5px;
            color: #333;
        }

        .book-count {
            font-size: 0.7rem;
            color: var(--primary);
            font-weight: 600;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 500px;
            border-radius: 8px;
            padding: 25px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            border: 4px solid var(--shelf-color);
        }

        .close-modal {
            position: absolute;
            top: 10px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
        }

        .book-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #eee;
        }

        .read-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 4px 12px;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.8rem;
            color: var(--shelf-color);
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .shelf-row { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1>Whisper Library</h1>
        <p>သေသပ်လှပသော သစ်သားစာအုပ်စင်</p>
    </div>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="စာရေးဆရာ ရှာဖွေရန်...">
        <button>ရှာမယ်</button>
    </div>
</header>

<div class="container" id="shelf-container">
    <!-- Rows will be loaded here -->
</div>

<footer>
    <p>&copy; 2026 Whisper Library | All Rights Reserved.</p>
</footer>

<div class="modal" id="book-modal">
    <div class="modal-content">
        <span class="close-modal" id="close-modal">&times;</span>
        <h2 id="modal-author-name" style="color: var(--shelf-color); margin-bottom: 20px; font-size: 1.3rem;">Author Name</h2>
        <div id="modal-book-list"></div>
    </div>
</div>

<script>
    let libraryData = [];

    async function init() {
        try {
            const response = await fetch('data.json');
            libraryData = await response.json();
            renderShelf(libraryData);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function renderShelf(data) {
        const container = document.getElementById('shelf-container');
        container.innerHTML = '';
        
        for (let i = 0; i < data.length; i += 4) {
            const rowData = data.slice(i, i + 4);
            const rowDiv = document.createElement('div');
            rowDiv.className = 'shelf-row';
            
            rowDiv.innerHTML = rowData.map(author => `
                <div class="book-spine" onclick='showBooks(${JSON.stringify(author).replace(/'/g, "&apos;")})'>
                    <div class="author-name">${author.author}</div>
                    <div class="book-count">${author.books.length} အုပ်</div>
                </div>
            `).join('');
            
            container.appendChild(rowDiv);
        }
    }

    function showBooks(author) {
        const modal = document.getElementById('book-modal');
        document.getElementById('modal-author-name').textContent = author.author;
        const list = document.getElementById('modal-book-list');
        list.innerHTML = author.books.map(b => `
            <div class="book-row">
                <span style="font-size: 0.9rem;">${b.title}</span>
                <a href="${b.link}" target="_blank" class="read-btn">ဖတ်ရန်</a>
            </div>
        `).join('');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = libraryData.filter(a => 
            a.author.toLowerCase().includes(query) || 
            a.books.some(b => b.title.toLowerCase().includes(query))
        );
        renderShelf(filtered);
    });

    document.getElementById('close-modal').onclick = () => {
        document.getElementById('book-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    window.onclick = (e) => {
        if (e.target == document.getElementById('book-modal')) {
            document.getElementById('book-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };

    init();
</script>

</body>
</html>
