<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Library - Nordic Bookshelf</title>
    <style>
        @font-face {
            font-family: 'PyidaungsuMM';
            src: url('https://raw.githubusercontent.com/WoWepub/Font/main/subset-Pyidaungsu.woff2') format('woff2');
            font-display: swap;
        }

        :root {
            --nord0: #2e3440;
            --nord1: #3b4252;
            --nord2: #434c5e;
            --nord3: #4c566a;
            --nord4: #d8dee9;
            --nord5: #e5e9f0;
            --nord6: #eceff4;
            --nord7: #8fbcbb;
            --nord8: #88c0d0;
            --nord9: #81a1c1;
            --nord10: #5e81ac;
            --nord11: #bf616a;
            --nord12: #d08770;
            --nord13: #ebcb8b;
            --nord14: #a3be8c;
            --nord15: #b48ead;
            
            --shelf-color: #434c5e;
            --primary: #88c0d0;
            --bg-color: #eceff4;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PyidaungsuMM', sans-serif;
            background-color: var(--bg-color);
            color: var(--nord0);
        }

        header {
            text-align: center;
            padding: 40px 20px;
            background: var(--nord0);
            color: var(--nord6);
            border-bottom: 4px solid var(--nord10);
            margin-bottom: 50px;
        }

        .logo h1 {
            font-size: 2.2rem;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.8rem;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
            color: var(--nord6);
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        .social-link:hover {
            background: var(--nord10);
            transform: translateY(-2px);
        }

        .social-icon { width: 18px; height: 18px; fill: currentColor; }

        .search-box {
            max-width: 500px;
            margin: 0 auto;
            display: flex;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 25px 0 0 25px;
            font-family: inherit;
            outline: none;
            font-size: 0.95rem;
            background: var(--nord6);
        }

        .search-box button {
            background: var(--nord10);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 0 25px 25px 0;
            cursor: pointer;
            font-weight: 700;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }

        /* Bookshelf Grid */
        .shelf-row {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
            padding-bottom: 15px;
            border-bottom: 15px solid var(--shelf-color);
            margin-bottom: 60px;
            position: relative;
        }

        .author-card {
            background: var(--white);
            border-radius: 8px 8px 0 0;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            height: 180px; /* Portrait height */
            position: relative;
        }

        .author-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 12px 20px rgba(0,0,0,0.1);
        }

        .author-img {
            width: 100%;
            height: 130px;
            object-fit: cover;
            background: var(--nord4);
        }

        .author-info {
            padding: 10px;
            text-align: center;
            background: var(--white);
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .author-name {
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--nord0);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-count-badge {
            font-size: 0.7rem;
            color: var(--nord10);
            font-weight: 700;
        }

        /* Original Expand Design (Modal) */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(46, 52, 64, 0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--nord0);
            width: 100%;
            max-width: 650px;
            border-radius: 16px;
            padding: 30px;
            position: relative;
            max-height: 85vh;
            overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--nord6);
        }

        .close-modal {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 2rem;
            cursor: pointer;
            color: var(--nord4);
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 25px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .modal-author-img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--nord10);
        }

        .modal-author-name {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--nord8), var(--nord15));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .book-list-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .book-item {
            background: rgba(255,255,255,0.05);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.05);
            transition: all 0.2s;
        }

        .book-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateX(5px);
        }

        .book-title {
            font-size: 1rem;
            font-weight: 500;
        }

        .read-btn {
            background: var(--nord10);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
            transition: all 0.2s;
        }

        .read-btn:hover {
            background: var(--nord9);
            box-shadow: 0 0 15px rgba(129, 161, 193, 0.4);
        }

        footer {
            text-align: center;
            padding: 40px;
            font-size: 0.85rem;
            color: var(--nord3);
        }

        @media (max-width: 992px) {
            .shelf-row { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .shelf-row { grid-template-columns: repeat(2, 1fr); }
            .logo h1 { font-size: 1.8rem; }
        }
        @media (max-width: 480px) {
            .shelf-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1>Whisper Library</h1>
    </div>
    
    <div class="social-links">
        <a class="social-link facebook" href="https://www.facebook.com/mmebookwhisper/" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
            Facebook
        </a>
        <a class="social-link youtube" href="https://www.youtube.com/@whisperofwordsebook" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
            YouTube
        </a>
        <a class="social-link twitter" href="https://x.com/whisperw69842" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
            Twitter/X
        </a>
        <a class="social-link telegram" href="https://t.me/TheBookR" target="_blank">
            <svg class="social-icon" viewBox="0 0 24 24"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.479.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            Telegram
        </a>
    </div>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="စာရေးဆရာ သို့မဟုတ် စာအုပ်အမည် ရှာပါ...">
        <button>ရှာမယ်</button>
    </div>
</header>

<div class="container" id="shelf-container">
    <!-- Rows will be loaded here -->
</div>

<footer>
    <p>&copy; 2026 Whisper Library | Nordic Minimalist Design.</p>
</footer>

<div class="modal" id="book-modal">
    <div class="modal-content">
        <span class="close-modal" id="close-modal">&times;</span>
        <div class="modal-header">
            <img id="modal-author-img" src="" class="modal-author-img">
            <h2 id="modal-author-name" class="modal-author-name">Author Name</h2>
        </div>
        <div id="modal-book-list" class="book-list-container"></div>
    </div>
</div>

<script>
    let libraryData = [];
    const authorPortraits = {
        "မင်းလူ": "https://www.pannsattlann.com/wp-content/uploads/2026/03/မင်းလူ-300x300.png",
        "မြသန်းတင့်": "https://mgyoe.com/wp-content/uploads/2021/06/Expert-Mya-Than-Tint.jpg",
        "ဂျူး": "https://www.pannsattlann.com/wp-content/uploads/2020/10/amhattaya-75x75.png",
        "တက္ကသိုလ်ဘုန်းနိုင်": "https://upload.wikimedia.org/wikipedia/my/thumb/b/b3/Tekkatho_Phone_Naing.jpg/220px-Tekkatho_Phone_Naing.jpg",
        "မောင်ထွန်းသူ": "https://upload.wikimedia.org/wikipedia/my/thumb/3/3a/Maung_Tun_Thu.jpg/220px-Maung_Tun_Thu.jpg",
        "default": "https://ui-avatars.com/api/?background=4c566a&color=eceff4&name="
    };

    async function init() {
        try {
            const response = await fetch('data.json');
            libraryData = await response.json();
            renderShelf(libraryData);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function getPortrait(name) {
        return authorPortraits[name] || (authorPortraits.default + encodeURIComponent(name));
    }

    function renderShelf(data) {
        const container = document.getElementById('shelf-container');
        container.innerHTML = '';
        
        for (let i = 0; i < data.length; i += 4) {
            const rowData = data.slice(i, i + 4);
            const rowDiv = document.createElement('div');
            rowDiv.className = 'shelf-row';
            
            rowDiv.innerHTML = rowData.map(author => `
                <div class="author-card" onclick='showBooks(${JSON.stringify(author).replace(/'/g, "&apos;")})'>
                    <img src="${getPortrait(author.author)}" class="author-img" alt="${author.author}" onerror="this.src='${authorPortraits.default + author.author}'">
                    <div class="author-info">
                        <div class="author-name">${author.author}</div>
                        <div class="book-count-badge">${author.books.length} Books</div>
                    </div>
                </div>
            `).join('');
            
            container.appendChild(rowDiv);
        }
    }

    function showBooks(author) {
        const modal = document.getElementById('book-modal');
        document.getElementById('modal-author-name').textContent = author.author;
        document.getElementById('modal-author-img').src = getPortrait(author.author);
        const list = document.getElementById('modal-book-list');
        list.innerHTML = author.books.map(b => `
            <div class="book-item">
                <span class="book-title">${b.title}</span>
                <a href="${b.link}" target="_blank" class="read-btn">ဖတ်ရန် →</a>
            </div>
        `).join('');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = libraryData.filter(a => 
            a.author.toLowerCase().includes(query) || 
            a.books.some(b => b.title.toLowerCase().includes(query))
        );
        renderShelf(filtered);
    });

    document.getElementById('close-modal').onclick = () => {
        document.getElementById('book-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    window.onclick = (e) => {
        if (e.target == document.getElementById('book-modal')) {
            document.getElementById('book-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };

    init();
</script>

</body>
</html>
