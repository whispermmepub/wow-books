<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Library - Modern Myanmar E-books</title>
    <style>
        @font-face {
            font-family: 'PyidaungsuMM';
            src: url('https://raw.githubusercontent.com/WoWepub/Font/main/subset-Pyidaungsu.woff2') format('woff2');
            font-display: swap;
        }

        :root {
            --primary: #f26522;
            --bg-light: #f9f9f9;
            --text-dark: #333;
            --text-muted: #666;
            --border: #eee;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PyidaungsuMM', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--white);
            padding: 30px 0;
            border-bottom: 3px solid var(--primary);
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            color: var(--primary);
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .search-box {
            max-width: 600px;
            margin: 20px auto;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-family: inherit;
            outline: none;
        }

        .search-box button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        /* Authors Grid - 4 Columns */
        .authors-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-top: 20px;
        }

        .author-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
        }

        .author-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }

        .author-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 10px;
        }

        .book-count {
            display: inline-block;
            background: #fff0e6;
            color: var(--primary);
            padding: 2px 12px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            border-radius: 12px;
            padding: 35px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 1.8rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .modal-author-title {
            color: var(--primary);
            font-size: 1.8rem;
            margin-bottom: 25px;
            border-bottom: 2px solid #fff0e6;
            padding-bottom: 15px;
        }

        .book-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border);
        }

        .read-btn {
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 6px 18px;
            border-radius: 5px;
            font-size: 0.85rem;
            font-weight: 600;
            transition: opacity 0.2s;
        }

        .read-btn:hover {
            opacity: 0.9;
        }

        footer {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 50px;
            border-top: 1px solid var(--border);
        }

        /* Responsive */
        @media (max-width: 992px) {
            .authors-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .authors-grid { grid-template-columns: repeat(2, 1fr); }
            .logo h1 { font-size: 2rem; }
        }
        @media (max-width: 480px) {
            .authors-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1>Whisper Library</h1>
        <p>ဉာဏ်ပညာနဲ့ ဆင်ယင်ထားတဲ့ အလှတရား</p>
    </div>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="စာရေးဆရာ သို့မဟုတ် စာအုပ်အမည် ရှာပါ...">
        <button>ရှာမယ်</button>
    </div>
</header>

<div class="container">
    <div class="authors-grid" id="authors-list">
        <!-- Authors will be loaded here -->
    </div>

    <footer>
        <p>&copy; 2026 Whisper Library. All books are provided for free.</p>
    </footer>
</div>

<div class="modal" id="book-modal">
    <div class="modal-content">
        <span class="close-modal" id="close-modal">&times;</span>
        <h2 id="modal-author-name" class="modal-author-title">Author Name</h2>
        <div id="modal-book-list"></div>
    </div>
</div>

<script>
    let libraryData = [];

    async function init() {
        try {
            const response = await fetch('data.json');
            libraryData = await response.json();
            renderAuthors(libraryData);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function renderAuthors(data) {
        const grid = document.getElementById('authors-list');
        grid.innerHTML = data.map(author => `
            <div class="author-card" onclick='showBooks(${JSON.stringify(author).replace(/'/g, "&apos;")})'>
                <div class="author-name">${author.author}</div>
                <div><span class="book-count">${author.books.length} အုပ်</span></div>
            </div>
        `).join('');
    }

    function showBooks(author) {
        const modal = document.getElementById('book-modal');
        document.getElementById('modal-author-name').textContent = author.author;
        const list = document.getElementById('modal-book-list');
        list.innerHTML = author.books.map(b => `
            <div class="book-row">
                <span style="font-weight: 500;">${b.title}</span>
                <a href="${b.link}" target="_blank" class="read-btn">ဖတ်ရန်</a>
            </div>
        `).join('');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = libraryData.filter(a => 
            a.author.toLowerCase().includes(query) || 
            a.books.some(b => b.title.toLowerCase().includes(query))
        );
        renderAuthors(filtered);
    });

    document.getElementById('close-modal').onclick = () => {
        document.getElementById('book-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    window.onclick = (e) => {
        if (e.target == document.getElementById('book-modal')) {
            document.getElementById('book-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };

    init();
</script>

</body>
</html>
