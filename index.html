<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Library - Wooden Bookshelf</title>
    <style>
        @font-face {
            font-family: 'PyidaungsuMM';
            src: url('https://raw.githubusercontent.com/WoWepub/Font/main/subset-Pyidaungsu.woff2') format('woff2');
            font-display: swap;
        }

        :root {
            --shelf-wood: #4d2c19;
            --shelf-shadow: #2a180d;
            --primary: #f39c12;
            --bg-dark: #1a1a1a;
            --text-main: #f0f0f0;
            --text-dim: #ccc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PyidaungsuMM', sans-serif;
            background: var(--bg-dark);
            background-image: radial-gradient(circle, #2c2c2c 0%, #1a1a1a 100%);
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        header {
            text-align: center;
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3rem;
            color: var(--primary);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-dim);
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .search-wrapper {
            max-width: 600px;
            margin: 0 auto 50px;
            position: relative;
        }

        .search-wrapper input {
            width: 100%;
            padding: 15px 25px 15px 50px;
            border-radius: 10px;
            background: #333;
            border: 2px solid var(--shelf-wood);
            color: white;
            font-size: 1rem;
            outline: none;
            font-family: inherit;
        }

        .search-icon {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
        }

        /* Bookshelf Layout */
        .bookshelf {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 40px 20px;
            padding: 20px 0;
        }

        .author-book {
            height: 220px;
            background: #8e44ad; /* Default book color */
            border-radius: 4px 15px 15px 4px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            box-shadow: 
                -5px 5px 10px rgba(0,0,0,0.5),
                inset 10px 0 10px rgba(0,0,0,0.2);
            border-left: 8px solid rgba(0,0,0,0.3);
        }

        .author-book:hover {
            transform: translateY(-10px) rotate(-2deg);
            box-shadow: -10px 15px 20px rgba(0,0,0,0.6);
        }

        /* Bookshelf Shelf Effect */
        .shelf-row {
            position: relative;
            margin-bottom: 60px;
            padding-bottom: 15px;
            border-bottom: 25px solid var(--shelf-wood);
            box-shadow: 0 10px 15px rgba(0,0,0,0.5);
        }

        .shelf-row::after {
            content: '';
            position: absolute;
            bottom: -25px;
            left: 0;
            width: 100%;
            height: 10px;
            background: var(--shelf-shadow);
        }

        .book-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
            margin-bottom: 10px;
            word-break: break-word;
        }

        .book-count {
            font-size: 0.8rem;
            background: rgba(255,255,255,0.2);
            padding: 2px 8px;
            border-radius: 10px;
        }

        /* Colors for variety */
        .color-1 { background: #c0392b; }
        .color-2 { background: #2980b9; }
        .color-3 { background: #27ae60; }
        .color-4 { background: #d35400; }
        .color-5 { background: #2c3e50; }
        .color-6 { background: #16a085; }

        /* Modal */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #2c3e50;
            width: 100%;
            max-width: 600px;
            border-radius: 15px;
            padding: 30px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
            border: 5px solid var(--shelf-wood);
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            background: none; border: none;
            color: #fff;
            font-size: 2rem;
            cursor: pointer;
        }

        .modal-author {
            font-size: 2rem;
            margin-bottom: 20px;
            color: var(--primary);
            text-align: center;
        }

        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .download-btn {
            background: var(--primary);
            color: #000;
            text-decoration: none;
            padding: 6px 15px;
            border-radius: 5px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* Responsive */
        @media (max-width: 992px) {
            .bookshelf { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .bookshelf { grid-template-columns: repeat(2, 1fr); }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Whisper Library</h1>
        <p class="subtitle">စင်ပေါ်က စာအုပ်များ</p>
        
        <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="စာရေးဆရာ သို့မဟုတ် စာအုပ်အမည် ရှာပါ...">
        </div>
    </header>

    <div id="shelf-container">
        <!-- Rows will be injected here -->
    </div>

    <footer style="text-align: center; padding: 40px; color: #666;">
        <p>&copy; 2026 Whisper Library. All rights reserved.</p>
    </footer>
</div>

<div class="modal" id="book-modal">
    <div class="modal-content">
        <button class="close-modal" id="close-modal">&times;</button>
        <h2 class="modal-author" id="modal-author-name">Author Name</h2>
        <div id="modal-book-list"></div>
    </div>
</div>

<script>
    let libraryData = [];
    const colors = ['color-1', 'color-2', 'color-3', 'color-4', 'color-5', 'color-6'];

    async function init() {
        try {
            const response = await fetch('data.json');
            libraryData = await response.json();
            renderShelf(libraryData);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function renderShelf(data) {
        const container = document.getElementById('shelf-container');
        container.innerHTML = '';
        
        // Group by 4
        for (let i = 0; i < data.length; i += 4) {
            const rowData = data.slice(i, i + 4);
            const rowDiv = document.createElement('div');
            rowDiv.className = 'shelf-row';
            
            const shelfDiv = document.createElement('div');
            shelfDiv.className = 'bookshelf';
            
            rowData.forEach((author, index) => {
                const bookDiv = document.createElement('div');
                bookDiv.className = `author-book ${colors[Math.floor(Math.random() * colors.length)]}`;
                bookDiv.innerHTML = `
                    <div class="book-title">${author.author}</div>
                    <div class="book-count">${author.books.length} အုပ်</div>
                `;
                bookDiv.onclick = () => showBooks(author);
                shelfDiv.appendChild(bookDiv);
            });
            
            rowDiv.appendChild(shelfDiv);
            container.appendChild(rowDiv);
        }
    }

    function showBooks(author) {
        const modal = document.getElementById('book-modal');
        document.getElementById('modal-author-name').textContent = author.author;
        const list = document.getElementById('modal-book-list');
        list.innerHTML = author.books.map(b => `
            <div class="book-item">
                <span>${b.title}</span>
                <a href="${b.link}" target="_blank" class="download-btn">ဖတ်ရန်</a>
            </div>
        `).join('');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = libraryData.filter(a => 
            a.author.toLowerCase().includes(query) || 
            a.books.some(b => b.title.toLowerCase().includes(query))
        );
        renderShelf(filtered);
    });

    document.getElementById('close-modal').onclick = () => {
        document.getElementById('book-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    window.onclick = (e) => {
        if (e.target == document.getElementById('book-modal')) {
            document.getElementById('book-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };

    init();
</script>

</body>
</html>
