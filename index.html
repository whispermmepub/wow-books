            position: relative;

            padding: 10px 18px;
            padding-right: 45px;

            border-radius: 25px;
            background: #fff;
            font-family: inherit;
            outline: none;
            font-size: 0.9rem;
        }

        .search-box button {
            position: absolute;
            right: 4px;
            top: 4px;
            background: var(--primary);
            color: white;
            border: none;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 15px 60px;
        }

        .author-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .author-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            border: 1px solid rgba(0,0,0,0.03);
        }

        .author-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.1);
        }

        .author-img-container {
            width: 100%;
            height: 120px; /* More compact height */
            overflow: hidden;
            background: #f8f9fa;
        }

        .author-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
        }

        .author-info {
            padding: 10px;
            text-align: center;
        }

        .author-name {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .book-count-badge {
            display: inline-block;
            padding: 1px 8px;
            background: #fff3e0;
            color: var(--primary);
            font-size: 0.65rem;
            font-weight: 700;
            border-radius: 10px;
        }

        /* Modal Design */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 15px;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: #fff;
            width: 100%;
            max-width: 500px;
            border-radius: 15px;
            padding: 25px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #999;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .modal-author-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            object-position: center top;
            border: 2px solid var(--primary);
        }

        .modal-author-name {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--secondary);
        }

        .book-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #f8f9fa;
            margin-bottom: 8px;
            border-radius: 10px;
        }

        .book-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);

        .read-btn {
            background: var(--primary);

            padding: 6px 15px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        footer {

            padding: 30px;
            font-size: 0.8rem;
            color: #777;

        @media (max-width: 992px) {

    async function init() {
        try {
            const response = await fetch('data.json');
            libraryData = await response.json();
            renderGrid(libraryData);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function getPortrait(name) {
        const normalizedName = name.replace(/့/g, "့").replace(/တင့်/g, "တင့်");
        return authorPortraits[normalizedName] || authorPortraits[name] || defaultLogo;
    }

    function renderGrid(data) {
        const grid = document.getElementById('author-grid');
        grid.innerHTML = data.map(author => `
            <div class="author-card" onclick='showBooks(${JSON.stringify(author).replace(/'/g, "&apos;")})'>
                <div class="author-img-container">
                    <img src="${getPortrait(author.author)}" class="author-img" alt="${author.author}" onerror="this.src='${defaultLogo}'">
                </div>
                <div class="author-info">
                    <div class="author-name">${author.author}</div>
                    <div class="book-count-badge">${author.books.length} Books</div>
                </div>
            </div>
        `).join('');
    }

    function showBooks(author) {
        const modal = document.getElementById('book-modal');
        document.getElementById('modal-author-name').textContent = author.author;
        document.getElementById('modal-author-img').src = getPortrait(author.author);
        const list = document.getElementById('modal-book-list');
        list.innerHTML = author.books.map(b => `
            <div class="book-item">
                <span class="book-title">${b.title}</span>
                <a href="${b.link}" target="_blank" class="read-btn">ဖတ်ရန်</a>
            </div>
        `).join('');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = libraryData.filter(a => 
            a.author.toLowerCase().includes(query) || 
            a.books.some(b => b.title.toLowerCase().includes(query))
        );
        renderGrid(filtered);
    });

    document.getElementById('close-modal').onclick = () => {
        document.getElementById('book-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    window.onclick = (e) => {
        if (e.target == document.getElementById('book-modal')) {
            document.getElementById('book-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };

    init();
</script>
