<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whisper Library - Modern Myanmar E-books</title>
    <style>
        @font-face {
            font-family: 'PyidaungsuMM';
            src: url('https://raw.githubusercontent.com/WoWepub/Font/main/subset-Pyidaungsu.woff2') format('woff2');
            font-display: swap;
        }

        :root {
            --primary: #f26522;
            --bg-light: #f9f9f9;
            --text-dark: #333;
            --text-muted: #666;
            --border: #eee;
            --white: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'PyidaungsuMM', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: var(--white);
            padding: 20px 0;
            border-bottom: 3px solid var(--primary);
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: var(--primary);
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .search-box {
            max-width: 600px;
            margin: 20px auto;
            display: flex;
            gap: 10px;
        }

        .search-box input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-family: inherit;
            outline: none;
        }

        .search-box button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }

        .section-title {
            font-size: 1.5rem;
            border-left: 5px solid var(--primary);
            padding-left: 15px;
            margin: 40px 0 20px;
            color: var(--text-dark);
        }

        .popular-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .book-card {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .book-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .book-card img {
            width: 100%;
            height: 250px;
            object-fit: contain;
            border-radius: 5px;
            margin-bottom: 15px;
            background: #f0f0f0;
        }

        .book-card h3 {
            font-size: 1rem;
            margin-bottom: 5px;
            height: 2.4em;
            overflow: hidden;
        }

        .book-card p {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 15px;
        }

        .read-btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            text-decoration: none;
            padding: 8px 20px;
            border-radius: 5px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .authors-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .author-item {
            background: var(--white);
            padding: 15px;
            border-radius: 5px;
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .author-item:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .author-count {
            background: #f0f0f0;
            padding: 2px 10px;
            border-radius: 15px;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: var(--white);
            width: 100%;
            max-width: 600px;
            border-radius: 10px;
            padding: 30px;
            position: relative;
            max-height: 80vh;
            overflow-y: auto;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--text-muted);
        }

        .book-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid var(--border);
        }

        @media (max-width: 992px) {
            .popular-grid, .authors-grid { grid-template-columns: repeat(3, 1fr); }
        }
        @media (max-width: 768px) {
            .popular-grid, .authors-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 480px) {
            .popular-grid, .authors-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <h1>Whisper Library</h1>
        <p>ဉာဏ်ပညာနဲ့ ဆင်ယင်ထားတဲ့ အလှတရား</p>
    </div>
    <div class="search-box">
        <input type="text" id="search-input" placeholder="စာအုပ်ရှာဖွေရန်........">
        <button>ရှာမယ်</button>
    </div>
</header>

<div class="container">
    <h2 class="section-title">လူကြိုက်များသော စာအုပ်များ (Popular Books)</h2>
    <div class="popular-grid" id="popular-books">
        <!-- Popular books will be loaded here -->
    </div>

    <h2 class="section-title">စာရေးဆရာများ (Authors)</h2>
    <div class="authors-grid" id="authors-list">
        <!-- Authors will be loaded here -->
    </div>

    <footer style="text-align: center; padding: 60px 0; color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 50px;">
        <p>&copy; 2026 Whisper Library | Inspiried by Pann Satt Lann</p>
    </footer>
</div>

<div class="modal" id="book-modal">
    <div class="modal-content">
        <span class="close-modal" id="close-modal">&times;</span>
        <h2 id="modal-author-name" style="color: var(--primary); margin-bottom: 20px;">Author Name</h2>
        <div id="modal-book-list"></div>
    </div>
</div>

<script>
    let libraryData = [];
    const popularBooks = [
        {
            title: "အများနှင့်မသက်ဆိုင်သောသူ",
            author: "မင်းလူ",
            cover: "https://www.pannsattlann.com/wp-content/uploads/2026/03/မင်းလူ-300x300.png",
            link: "https://t.me/TheBookR/1233?single"
        },
        {
            title: "အမှတ်တရ",
            author: "ဂျူး",
            cover: "https://www.pannsattlann.com/wp-content/uploads/2020/10/amhattaya-75x75.png",
            link: "https://t.me/TheBookR/394?single"
        },
        {
            title: "အမည်မဖော်လိုသူအချစ်",
            author: "မင်းလူ",
            cover: "https://www.pannsattlann.com/wp-content/uploads/2025/09/1-11-300x300.png",
            link: "https://t.me/TheBookR/1195?single"
        },
        {
            title: "အော်ဆွေး",
            author: "မင်းလူ",
            cover: "https://www.pannsattlann.com/wp-content/uploads/2025/08/1-29-300x300.png",
            link: "https://t.me/TheBookR/1169?single"
        }
    ];

    async function init() {
        try {
            const response = await fetch('data.json');
            libraryData = await response.json();
            renderPopular();
            renderAuthors(libraryData);
        } catch (error) {
            console.error('Error:', error);
        }
    }

    function renderPopular() {
        const grid = document.getElementById('popular-books');
        grid.innerHTML = popularBooks.map(book => `
            <div class="book-card">
                <img src="${book.cover}" alt="${book.title}">
                <h3>${book.title}</h3>
                <p>${book.author}</p>
                <a href="${book.link}" target="_blank" class="read-btn">ဖတ်ရန်</a>
            </div>
        `).join('');
    }

    function renderAuthors(data) {
        const grid = document.getElementById('authors-list');
        grid.innerHTML = data.map(author => `
            <div class="author-item" onclick='showBooks(${JSON.stringify(author).replace(/'/g, "&apos;")})'>
                <span>${author.author}</span>
                <span class="author-count">${author.books.length} အုပ်</span>
            </div>
        `).join('');
    }

    function showBooks(author) {
        const modal = document.getElementById('book-modal');
        document.getElementById('modal-author-name').textContent = author.author;
        const list = document.getElementById('modal-book-list');
        list.innerHTML = author.books.map(b => `
            <div class="book-row">
                <span>${b.title}</span>
                <a href="${b.link}" target="_blank" class="read-btn" style="padding: 5px 15px; font-size: 0.8rem;">ဖတ်ရန်</a>
            </div>
        `).join('');
        modal.style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }

    document.getElementById('search-input').addEventListener('input', (e) => {
        const query = e.target.value.toLowerCase();
        const filtered = libraryData.filter(a => 
            a.author.toLowerCase().includes(query) || 
            a.books.some(b => b.title.toLowerCase().includes(query))
        );
        renderAuthors(filtered);
    });

    document.getElementById('close-modal').onclick = () => {
        document.getElementById('book-modal').style.display = 'none';
        document.body.style.overflow = 'auto';
    };

    window.onclick = (e) => {
        if (e.target == document.getElementById('book-modal')) {
            document.getElementById('book-modal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
    };

    init();
</script>

</body>
</html>
